# Refreshes roster/contract data on a schedule and commits it. The app fetches
# data/{meta,players}.json from raw.githubusercontent.com at launch (see
# lib/liveData.ts), so a data commit reaches users without an App Store release.
#
# Cadence: daily by default. During free agency (July) or trade-deadline week
# (early Feb), bump the cron or trigger manually from the Actions tab.
#
# Known risk: Basketball-Reference sometimes blocks cloud/datacenter IPs. If
# runs start failing with HTTP 403 or "page suspiciously small", run
# `npm run data:refresh` locally and push instead — the app doesn't care who
# committed the data.

name: Refresh roster data

on:
  schedule:
    - cron: '17 11 * * *' # daily, 11:17 UTC (off the top of the hour)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Refresh data from Basketball-Reference
        run: node scripts/refresh-data.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- data/players.json data/teams.json; then
            echo "No roster changes."
            exit 0
          fi
          git config user.name "roster-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Refresh roster data ($(date -u +%Y-%m-%d))"
          git push
